<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 Garden AutoCut</title>
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --accent3: #d2a8ff;
  --warn: #d29922;
  --danger: #f85149;
  --green: #3fb950;
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }

/* Header */
.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 20px; font-weight: 600; }
.header h1 span { color: var(--accent2); }
.header .back-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; border-radius: var(--radius); cursor: pointer; font-size: 13px; display: none; }
.header .back-btn:hover { border-color: var(--accent); color: var(--text); }

/* Main container */
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* Project list */
.project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.project-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: all 0.2s; }
.project-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.project-card .date { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.project-card .topic { font-size: 14px; color: var(--accent3); margin-bottom: 8px; }
.project-card .info { color: var(--text2); font-size: 13px; display: flex; gap: 16px; flex-wrap: wrap; }
.project-card .info .tag { background: var(--bg3); padding: 2px 8px; border-radius: 4px; font-size: 12px; }
.project-card .info .tag.done { background: rgba(63,185,80,0.15); color: var(--green); }
.project-card .info .tag.pending { background: rgba(210,169,34,0.15); color: var(--warn); }

/* Project detail */
.project-view { display: none; }
.project-header { margin-bottom: 24px; }
.project-header h2 { font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.project-header .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
.theme-input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: var(--radius); font-size: 14px; width: 250px; }
.theme-input:focus { border-color: var(--accent); outline: none; }
.btn { padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg3); color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
.btn:hover { border-color: var(--accent); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: #4090e0; }
.btn.green { background: var(--green); color: #fff; border-color: var(--green); }
.btn.green:hover { background: #2ea043; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Progress bar */
.progress-bar { background: var(--bg3); border-radius: 4px; height: 6px; overflow: hidden; margin-top: 12px; display: none; }
.progress-bar .fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); transition: width 0.3s; width: 0; }
.progress-text { font-size: 13px; color: var(--text2); margin-top: 6px; display: none; }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; overflow-x: auto; }
.tab { padding: 10px 20px; font-size: 13px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.2s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Video grid */
.video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.video-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.video-card video { width: 100%; aspect-ratio: 9/16; object-fit: cover; background: #000; max-height: 300px; }
.video-card .meta { padding: 12px; }
.video-card .meta .name { font-size: 13px; font-weight: 600; margin-bottom: 4px; word-break: break-all; }
.video-card .meta .detail { font-size: 12px; color: var(--text2); }

/* Keyframe gallery */
.kf-section { margin-bottom: 24px; }
.kf-section h3 { font-size: 15px; color: var(--text2); margin-bottom: 12px; }
.kf-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
.kf-thumb { aspect-ratio: 9/16; overflow: hidden; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; position: relative; }
.kf-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s; }
.kf-thumb:hover img { transform: scale(1.05); }
.kf-thumb .idx { position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,0.7); color: var(--accent); font-size: 11px; padding: 1px 5px; border-radius: 3px; }

/* Contact sheet */
.contact-sheet { max-width: 100%; border-radius: var(--radius); border: 1px solid var(--border); }

/* JSON viewer */
.json-view { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; font-family: 'SF Mono', Monaco, monospace; font-size: 13px; overflow-x: auto; max-height: 600px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
.json-key { color: var(--accent3); }
.json-string { color: #a5d6ff; }
.json-number { color: #79c0ff; }
.json-bool { color: #ff7b72; }

/* Script/story view */
.script-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.script-card .title { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.script-card .subtitle { color: var(--text2); font-size: 14px; margin-bottom: 16px; }
.script-card .storyline { background: var(--bg3); padding: 12px 16px; border-radius: var(--radius); border-left: 3px solid var(--accent); margin-bottom: 16px; font-style: italic; }
.script-clips { display: grid; gap: 12px; }
.script-clip { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; display: grid; grid-template-columns: 60px 1fr; gap: 12px; }
.script-clip .role-badge { background: var(--bg); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--accent); font-weight: 600; text-align: center; padding: 4px; }
.script-clip .clip-info .caption { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.script-clip .clip-info .source { font-size: 12px; color: var(--text2); }
.script-clip .clip-info .time { font-size: 12px; color: var(--accent2); margin-top: 4px; }

/* Preview */
.clip-preview { margin-top: 8px; display: none; }
.clip-preview.show { display: block; }
.clip-preview video { width: 100%; max-width: 320px; aspect-ratio: 9/16; object-fit: cover; border-radius: 6px; background: #000; }
.preview-toggle { font-size: 11px; color: var(--accent); cursor: pointer; margin-top: 4px; display: inline-block; }
.preview-toggle:hover { text-decoration: underline; }

/* Editable fields */
.edit-field { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 4px; font-size: 13px; width: 100%; font-family: inherit; }
.edit-field:focus { border-color: var(--accent); outline: none; }
.edit-field.sm { width: 80px; display: inline-block; text-align: center; font-family: monospace; }
.edit-row { display: flex; gap: 8px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
.edit-row label { font-size: 11px; color: var(--text2); min-width: 30px; }
.save-bar { position: sticky; bottom: 0; background: var(--bg2); border-top: 1px solid var(--border); padding: 12px 20px; display: flex; gap: 12px; align-items: center; z-index: 10; }
.save-bar .status { font-size: 13px; color: var(--text2); margin-left: auto; }
.toast { position: fixed; top: 20px; right: 20px; background: var(--green); color: #fff; padding: 10px 20px; border-radius: var(--radius); font-size: 14px; z-index: 9999; animation: fadeInOut 2s ease; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateY(-10px)} 10%{opacity:1;transform:translateY(0)} 80%{opacity:1} 100%{opacity:0} }

/* Transcription view */
.trans-segment { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.trans-segment .time { color: var(--accent); font-size: 12px; font-family: monospace; min-width: 120px; padding-top: 2px; }
.trans-segment .text { font-size: 14px; }

/* Output view */
.output-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.output-card video { max-width: 360px; width: 100%; border-radius: var(--radius); margin-bottom: 12px; }
.output-card .info { color: var(--text2); font-size: 13px; }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty .icon { font-size: 48px; margin-bottom: 16px; }
.empty .msg { font-size: 15px; }

/* Lightbox */
.lightbox { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; cursor: pointer; }
.lightbox.show { display: flex; }
.lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }

/* Loading spinner */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Modal */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 400px; max-width: 90vw; }
.modal h3 { font-size: 18px; margin-bottom: 16px; color: var(--accent); }
.modal .form-group { margin-bottom: 16px; }
.modal .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.modal .form-group input { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: var(--radius); font-size: 14px; }
.modal .form-group input:focus { border-color: var(--accent); outline: none; }
.modal .form-actions { display: flex; gap: 12px; justify-content: flex-end; }
.modal .hint { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* Shot cards */
.shots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.shot-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; position: relative; }
.shot-card.deleted { opacity: 0.5; border-color: var(--danger); }
.shot-card .shot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.shot-card .shot-id { font-size: 12px; font-family: monospace; color: var(--accent); }
.shot-card .shot-time { font-size: 12px; font-family: monospace; color: var(--accent2); }
.shot-card .shot-summary { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.shot-card .shot-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.shot-card .shot-tag { background: var(--bg3); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; font-size: 11px; color: var(--text2); }
.shot-card .shot-tag.use { background: rgba(88,166,255,0.15); color: var(--accent); border-color: rgba(88,166,255,0.3); }
.shot-card .shot-tag.delete { background: rgba(248,81,73,0.15); color: var(--danger); border-color: rgba(248,81,73,0.3); }
.shot-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
.shot-scores .score-group { font-size: 11px; }
.shot-scores .score-group .label { color: var(--text2); margin-bottom: 2px; }
.shot-scores .score-bar { display: flex; gap: 3px; align-items: center; }
.shot-scores .score-pip { width: 14px; height: 6px; border-radius: 2px; background: var(--bg3); }
.shot-scores .score-pip.filled { background: var(--accent); }
.shot-scores .score-pip.high { background: var(--green); }
.shot-scores .score-pip.low { background: var(--danger); }
.shot-objects { font-size: 11px; color: var(--text2); margin-top: 6px; }
.shot-actions { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }

/* Responsive */
@media (max-width: 768px) {
  .container { padding: 12px; }
  .project-grid { grid-template-columns: 1fr; }
  .video-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .kf-gallery { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
  .project-header .controls { flex-direction: column; }
  .theme-input { width: 100%; }
}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" id="backBtn" onclick="showProjects()">← 返回</button>
  <h1>🌿 <span>Garden AutoCut</span></h1>
</div>

<div class="container">
  <!-- Project List -->
  <div id="projectList">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 style="font-size:18px;color:var(--text2)">📁 项目列表</h2>
      <div style="display:flex;gap:8px">
        <button class="btn primary" onclick="showCreateModal()">➕ 新建项目</button>
        <button class="btn" onclick="loadProjects()">🔄 刷新</button>
      </div>
    </div>
    <div class="project-grid" id="projectGrid"></div>
  </div>

  <!-- Create Project Modal -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <h3>➕ 新建项目</h3>
      <div class="form-group">
        <label>📅 日期</label>
        <input type="date" id="newProjectDate" value="">
      </div>
      <div class="form-group">
        <label>🏷️ 主题名称</label>
        <input type="text" id="newProjectTopic" placeholder="例如：花园修剪、宠物日常" value="">
        <div class="hint">中文主题名会自动生成英文 slug（如"花园修剪" → "garden-trimming"）</div>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="closeCreateModal()">取消</button>
        <button class="btn primary" onclick="createProject()">创建</button>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal-overlay" id="importModal">
    <div class="modal" style="width:550px;max-height:80vh;overflow-y:auto">
      <h3>📥 导入素材</h3>

      <!-- Inbox 扫描 -->
      <div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:13px;color:var(--text2)">📂 Inbox 目录</span>
          <button class="btn" style="font-size:12px;padding:4px 10px" onclick="scanInbox()">🔄 扫描</button>
        </div>
        <div id="inboxVideos" style="max-height:200px;overflow-y:auto">
          <div style="color:var(--text2);font-size:13px">点击"扫描"查看 Inbox 中的视频</div>
        </div>
      </div>

      <!-- 自定义路径 -->
      <div style="margin-bottom:16px">
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px">📁 从其他目录导入</div>
        <div style="display:flex;gap:8px">
          <input type="text" class="edit-field" id="scanDirInput" placeholder="输入目录路径，如 ~/Desktop 或 /path/to/videos" style="flex:1">
          <button class="btn" onclick="scanDirectory()">扫描</button>
        </div>
        <div id="dirVideos" style="max-height:150px;overflow-y:auto;margin-top:8px"></div>
      </div>

      <!-- 手动输入文件路径 -->
      <div style="margin-bottom:16px">
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px">📝 直接输入文件路径 (每行一个)</div>
        <textarea class="edit-field" id="manualPaths" rows="3" placeholder="/path/to/video1.mp4&#10;/path/to/video2.MOV" style="width:100%"></textarea>
      </div>

      <div class="form-actions">
        <button class="btn" onclick="closeImportModal()">取消</button>
        <button class="btn primary" onclick="importSelected()">导入所选</button>
        <button class="btn green" onclick="importManual()">导入路径</button>
      </div>
      <div id="importStatus" style="font-size:12px;color:var(--text2);margin-top:8px"></div>
    </div>
  </div>

  <!-- Project Detail -->
  <div id="projectDetail" class="project-view">
    <div class="project-header">
      <h2 id="projectTitle"></h2>
      <div class="controls">
        <input type="text" class="theme-input" id="themeInput" placeholder="输入视频主题..." value="日常生活记录">
        <div style="display:flex;align-items:center;gap:4px">
          <span style="font-size:13px;color:var(--text2)">⏱️</span>
          <select class="theme-input" id="durationInput" style="width:80px">
            <option value="30">30秒</option>
            <option value="45">45秒</option>
            <option value="60" selected>60秒</option>
            <option value="90">90秒</option>
            <option value="120">2分钟</option>
            <option value="180">3分钟</option>
          </select>
        </div>
        <button class="btn green" onclick="showImportModal()">📥 导入素材</button>
        <button class="btn primary" id="btnFullPipeline" onclick="runFullPipeline()">🎯 生成剪辑方案</button>
        <button class="btn" onclick="runStage('keyframes')">🎞️ 抽帧</button>
        <button class="btn" onclick="runStage('visual-analysis')">👁️ 分析</button>
        <button class="btn" onclick="runStage('hook-candidates')">🪝 Hook评分</button>
        <button class="btn" onclick="runStage('story-script')">📝 生成方案</button>
        <button class="btn" onclick="runStage('edit-plan')">📋 决策书</button>
        <button class="btn" onclick="runStage('retention-check')">⚡ 节奏检查</button>
        <button class="btn" onclick="runRender('draft')">📝 草稿</button>
        <button class="btn green" onclick="runRender('publish')">🎬 发布渲染</button>
        <button class="btn" onclick="runStage('publish-pack')">📦 发布包</button>
      </div>
      <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>

    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="videos">📹 素材</div>
      <div class="tab" data-tab="analysis">👁️ 片段分析</div>
      <div class="tab" data-tab="hooks">🪝 Hook</div>
      <div class="tab" data-tab="script">📝 候选方案</div>
      <div class="tab" data-tab="edit-plan">📋 决策书</div>
      <div class="tab" data-tab="retention">⚡ 节奏</div>
      <div class="tab" data-tab="publish-pack">📦 发布包</div>
      <div class="tab" data-tab="output">🎬 输出</div>
      <div class="tab" data-tab="keyframes">🎞️ 帧</div>
      <div class="tab" data-tab="transcription">🎙️ 字幕</div>
    </div>

    <div id="tabContent">
      <div class="tab-content active" id="tc-videos"></div>
      <div class="tab-content" id="tc-analysis"></div>
      <div class="tab-content" id="tc-hooks"></div>
      <div class="tab-content" id="tc-script"></div>
      <div class="tab-content" id="tc-edit-plan"></div>
      <div class="tab-content" id="tc-retention"></div>
      <div class="tab-content" id="tc-publish-pack"></div>
      <div class="tab-content" id="tc-output"></div>
      <div class="tab-content" id="tc-keyframes"></div>
      <div class="tab-content" id="tc-transcription"></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="">
</div>

<script>
const API = '';
let currentProject = null;
let progressSSE = null;

// ─── Tab switching ───
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('tc-' + tab.dataset.tab).classList.add('active');
});

// ─── Load projects ───
async function loadProjects() {
  const res = await fetch(`${API}/api/projects`);
  const projects = await res.json();
  const grid = document.getElementById('projectGrid');
  if (projects.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="icon">📭</div><div class="msg">暂无项目。<br>将视频放入 ~/Movies/GardenAutoCut/Inbox 后刷新。</div></div>';
    return;
  }
  grid.innerHTML = projects.map(p => `
    <div class="project-card" onclick="openProject('${p.id}')">
      <div class="date">📅 ${p.date || p.id}</div>
      ${p.topic ? `<div class="topic">🏷️ ${p.topic}</div>` : ''}
      <div class="info">
        <span class="tag">${p.video_count} 个视频</span>
        <span class="tag ${p.has_analysis ? 'done' : 'pending'}">${p.has_analysis ? '✓ 已分析' : '○ 未分析'}</span>
        <span class="tag ${p.has_story_script ? 'done' : 'pending'}">${p.has_story_script ? '✓ 有剧本' : '○ 无剧本'}</span>
        <span class="tag ${p.has_output ? 'done' : 'pending'}">${p.has_output ? '✓ 已输出' : '○ 未渲染'}</span>
      </div>
    </div>
  `).join('');
}

// ─── Open project ───
async function openProject(projectId) {
  currentProject = projectId;
  document.getElementById('projectList').style.display = 'none';
  document.getElementById('projectDetail').style.display = 'block';
  document.getElementById('backBtn').style.display = 'inline-block';

  const res = await fetch(`${API}/api/projects/${projectId}`);
  const data = await res.json();

  // 显示日期 + 主题
  const titleParts = [];
  if (data.date) titleParts.push('📅 ' + data.date);
  if (data.topic) titleParts.push('🏷️ ' + data.topic);
  document.getElementById('projectTitle').textContent = titleParts.join(' · ') || projectId;

  renderProject(data);
}

function showProjects() {
  document.getElementById('projectList').style.display = 'block';
  document.getElementById('projectDetail').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  if (progressSSE) { progressSSE.close(); progressSSE = null; }
}

// ─── Render project ───
function renderProject(data) {
  // Videos
  const tc = document.getElementById('tc-videos');
  if (data.videos && data.videos.length > 0) {
    tc.innerHTML = '<div class="video-grid">' + data.videos.map(v => `
      <div class="video-card">
        <video src="${API}/api/video/${data.id}/${v.filename}" muted preload="metadata" controls></video>
        <div class="meta">
          <div class="name">${v.filename}</div>
          <div class="detail">${v.duration?.toFixed(1)}s · ${v.width}×${v.height} · ${v.size_mb}MB ${v.has_audio ? '🔊' : '🔇'}</div>
        </div>
      </div>
    `).join('') + '</div>';
  } else {
    tc.innerHTML = '<div class="empty"><div class="icon">📹</div><div class="msg">暂无素材视频<br><button class="btn green" style="margin-top:12px" onclick="showImportModal()">📥 导入素材</button></div></div>';
  }

  // Keyframes
  const tk = document.getElementById('tc-keyframes');
  if (data.keyframes && (data.keyframes.fixed?.length > 0 || data.keyframes.scene?.length > 0)) {
    let html = '';
    for (const sub of ['fixed', 'scene']) {
      const frames = data.keyframes[sub] || [];
      if (frames.length === 0) continue;
      html += `<div class="kf-section"><h3>${sub === 'fixed' ? '⏱️ 固定间隔' : '🎬 场景变化'} (${frames.length} 帧)</h3><div class="kf-gallery">`;

        html += `<div class="kf-thumb" onclick="showLightbox('${API}/api/keyframe/${data.id}/${sub}/${f}')"><img src="${API}/api/keyframe/${data.id}/${sub}/${f}" loading="lazy"><span class="idx">${i+1}</span></div>`;
      });
      html += '</div></div>';
    }
    tk.innerHTML = html;
  } else {
    tk.innerHTML = '<div class="empty"><div class="icon">🎞️</div><div class="msg">尚未抽取关键帧</div></div>';
  }

  // Contact sheets (tab may not exist if removed from UI)
  const tcs = document.getElementById('tc-contact-sheets');
  if (tcs) tcs.innerHTML = '<div class="empty"><div class="icon">🖼️</div><div class="msg">运行视觉分析后自动生成</div></div>';

  // Analysis / Shots
  const ta = document.getElementById('tc-analysis');
  let analysisHtml = '';
  if (data.video_template) {
    const vt = data.video_template;
    analysisHtml += `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;gap:16px;align-items:center;flex-wrap:wrap">
      <span style="font-size:14px;font-weight:600;color:var(--accent)">🎬 ${esc(vt.template_name || '?')}</span>
      <span style="font-size:12px;color:var(--text2)">${esc(vt.reason || '')}</span>
      <span style="font-size:12px;color:var(--accent3)">🎯 ${esc(vt.hook_strategy || '')}</span>
      <span style="font-size:12px;color:var(--text2)">🎵 ${esc(vt.tone || '')}</span>
    </div>`;
  }
  if (data.shots && data.shots.shots && data.shots.shots.length > 0) {
    window._currentShots = data.shots.shots;
    analysisHtml += renderShots(data.shots);
  } else if (data.analysis && data.analysis.length > 0) {
    analysisHtml += '<div class="json-view">' + syntaxHighlight(JSON.stringify(data.analysis, null, 2)) + '</div>';
  } else {
    analysisHtml += '<div class="empty"><div class="icon">👁️</div><div class="msg">尚未进行视觉分析</div></div>';
  }
  ta.innerHTML = analysisHtml;

  // Hook Candidates
  const th = document.getElementById('tc-hooks');
  if (data.hook_candidates && data.hook_candidates.candidates && data.hook_candidates.candidates.length > 0) {
    th.innerHTML = renderHookCandidates(data.hook_candidates);
  } else {
    th.innerHTML = '<div class="empty"><div class="icon">🪝</div><div class="msg">尚未进行 Hook 评分</div></div>';

  // Story Plans (3 个候选方案)
  const ts2 = document.getElementById('tc-script');
  if (data.story_plans && data.story_plans.plans && data.story_plans.plans.length > 0) {
    ts2.innerHTML = renderStoryPlans(data.story_plans);
  } else if (data.story_script) {
    ts2.innerHTML = renderScript(data.story_script);
  } else {
    ts2.innerHTML = '<div class="empty"><div class="icon">📝</div><div class="msg">尚未生成候选方案</div></div>';
  }

  // Retention Audit
  const tr = document.getElementById('tc-retention');
  if (data.retention_audit) {
    tr.innerHTML = renderRetentionAudit(data.retention_audit);
  } else {
    tr.innerHTML = '<div class="empty"><div class="icon">⚡</div><div class="msg">尚未进行节奏检查</div></div>';

  // Transcription
  const tt = document.getElementById('tc-transcription');
  if (data.transcription && data.transcription.length > 0) {
    let html = '';
    data.transcription.forEach(t => {
      html += `<div class="script-card"><div class="title">${t.file}</div>`;
      if (t.segments && t.segments.length > 0) {
        t.segments.forEach(s => {
          html += `<div class="trans-segment"><span class="time">${fmtTime(s.start)} → ${fmtTime(s.end)}</span><span class="text">${s.text}</span></div>`;
        });
      } else {
        html += `<div style="color:var(--text2)">${t.note || '无转写内容'}</div>`;
      }
      html += '</div>';
    });
    tt.innerHTML = html;
  } else {
    tt.innerHTML = '<div class="empty"><div class="icon">🎙️</div><div class="msg">尚未转写字幕</div></div>';
  }

  // Edit plan
  const tep = document.getElementById('tc-edit-plan');
  if (data.edit_plan) {
    tep.innerHTML = renderEditPlan(data.edit_plan);
  } else {
    tep.innerHTML = '<div class="empty"><div class="icon">📋</div><div class="msg">尚未生成剪辑计划</div></div>';
  }

  // Publish Pack + Performance
  const tp = document.getElementById('tc-publish-pack');
  let packHtml = '';
  if (data.publish_pack) {
    packHtml += renderPublishPack(data.publish_pack);
  }
  // 性能记录表单
  packHtml += `<div class="script-card" style="margin-top:16px">
    <div class="title">📊 发布数据记录</div>
    <div class="subtitle">发布后回填数据，用于系统学习优化</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">
      <div class="edit-row"><label>平台</label>
        <select class="edit-field" id="perf-platform" style="width:120px">
          <option value="douyin">🎵 抖音</option><option value="xiaohongshu">📕 小红书</option><option value="shipinhao">📺 视频号</option>
        </select></div>
      <div class="edit-row"><label>标题</label><input class="edit-field" id="perf-title" placeholder="实际发布的标题" style="width:200px"></div>
      <div class="edit-row"><label>👁️ 播放</label><input class="edit-field sm" id="perf-views" type="number" placeholder="0"></div>
      <div class="edit-row"><label>❤️ 点赞</label><input class="edit-field sm" id="perf-likes" type="number" placeholder="0"></div>
      <div class="edit-row"><label>💬 评论</label><input class="edit-field sm" id="perf-comments" type="number" placeholder="0"></div>
      <div class="edit-row"><label>⭐ 收藏</label><input class="edit-field sm" id="perf-saves" type="number" placeholder="0"></div>
      <div class="edit-row"><label>🔄 转发</label><input class="edit-field sm" id="perf-shares" type="number" placeholder="0"></div>
      <div class="edit-row"><label>⏱️ 平均观看</label><input class="edit-field sm" id="perf-watch" type="number" placeholder="秒"></div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn primary" onclick="submitPerformance()">📊 记录数据</button>
      <button class="btn" onclick="loadWeeklyReport()">📈 查看周报</button>
    </div>
    <div id="perf-status" style="font-size:12px;color:var(--text2);margin-top:8px"></div>
    <div id="weekly-report" style="margin-top:12px"></div>
  </div>`;
  tp.innerHTML = packHtml || '<div class="empty"><div class="icon">📦</div><div class="msg">尚未生成发布包</div></div>';

  // Output
  const to = document.getElementById('tc-output');
  if (data.outputs && Object.keys(data.outputs).length > 0) {
    let html = '';
    for (const [name, info] of Object.entries(data.outputs)) {
      if (name.endsWith('.mp4')) {
        html += `<div class="output-card">
          <video src="${API}/api/output/${data.id}/${name}" controls></video>
          <div class="info"><strong>${name}</strong> · ${info.size_mb}MB</div>
        </div>`;
      } else if (name.endsWith('.srt')) {
        html += `<div class="output-card"><div class="info"><strong>${name}</strong> · ${info.size_mb}KB</div></div>`;
      } else if (name.endsWith('.jpg')) {
        html += `<div class="output-card"><img src="${API}/api/output/${data.id}/${name}" style="max-width:200px;border-radius:8px"><div class="info"><strong>${name}</strong></div></div>`;
      }
    }
    to.innerHTML = html || '<div class="empty"><div class="icon">🎬</div><div class="msg">暂无输出</div></div>';
  } else {
    to.innerHTML = '<div class="empty"><div class="icon">🎬</div><div class="msg">尚未渲染输出</div></div>';
  }
}

// ─── Hook Candidates ───
function renderHookCandidates(data) {
  const candidates = data.candidates || [];
  if (candidates.length === 0) return '<div class="empty"><div class="icon">🪝</div><div class="msg">无 Hook 候选</div></div>';

  let html = `<div style="margin-bottom:12px;font-size:13px;color:var(--text2)">
    🪝 Hook 评分 — 找出最适合做开头的片段 (${candidates.length} 个候选)
  </div>`;

  candidates.forEach(c => {
    const scoreColor = c.score >= 80 ? 'var(--green)' : c.score >= 60 ? 'var(--warn)' : 'var(--text2)';
    html += `<div class="script-card" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <span style="font-size:12px;color:var(--accent)">#${c.rank}</span>
          <span style="font-size:14px;font-weight:600;margin-left:8px">${esc(c.source || '?')}</span>
          <span style="font-size:12px;color:var(--accent2);margin-left:8px">${(c.start||0).toFixed(1)}s → ${(c.end||0).toFixed(1)}s</span>
        </div>
        <span style="font-size:18px;font-weight:700;color:${scoreColor}">${c.score}分</span>
      </div>
      <div style="margin-top:6px;font-size:13px">
        <span style="background:var(--bg3);padding:2px 8px;border-radius:4px;margin-right:8px">${esc(c.hook_type || '?')}</span>
        ${c.works_muted ? '<span style="color:var(--green);margin-right:8px">🔇 静音可懂</span>' : '<span style="color:var(--warn);margin-right:8px">🔊 需要声音</span>'}
        ${c.visual_question ? `<span style="color:var(--accent3)">❓ ${esc(c.visual_question)}</span>` : ''}
      </div>
      ${c.caption ? `<div style="margin-top:4px;font-size:12px;color:var(--text2)">💬 ${esc(c.caption)}</div>` : ''}
    </div>`;
  });
  return html;
}

// ─── Story Plans (3 个候选方案) ───
function renderStoryPlans(data) {
  const plans = data.plans || [];
  if (plans.length === 0) return '<div class="empty"><div class="icon">📝</div><div class="msg">无候选方案</div></div>';

  // 按推荐指数排序
  const sorted = [...plans].sort((a, b) => (b.recommendation_score || 0) - (a.recommendation_score || 0));

  let html = `<div style="margin-bottom:12px;font-size:13px;color:var(--text2)">
    📝 ${plans.length} 个候选方案 — 选择最适合的角度
    ${data.selected_plan ? `<span style="margin-left:12px;color:var(--green)">✅ 已选: ${esc(data.selected_plan)}</span>` : ''}
  </div>`;

  sorted.forEach((p, idx) => {
    const isTop = idx === 0;
    const scoreColor = (p.recommendation_score || 0) >= 80 ? 'var(--green)' : (p.recommendation_score || 0) >= 60 ? 'var(--warn)' : 'var(--text2)';
    html += `<div class="script-card" style="margin-bottom:12px;${isTop ? 'border-left:3px solid var(--green)' : ''}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <span style="font-size:16px;font-weight:700;color:var(--accent)">${esc(p.plan_id || '?')}</span>
          <span style="font-size:14px;margin-left:8px">${esc(p.angle || '?')}</span>
          ${isTop ? '<span style="background:var(--green);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;margin-left:8px">推荐</span>' : ''}
        </div>
        <span style="font-size:20px;font-weight:700;color:${scoreColor}">${p.recommendation_score || 0}</span>
      </div>
      <div style="margin-top:8px;font-size:13px;color:var(--text2)">${esc(p.reason || '')}</div>
      ${p.risk ? `<div style="margin-top:4px;font-size:12px;color:var(--warn)">⚠️ ${esc(p.risk)}</div>` : ''}
      <div style="margin-top:8px;display:flex;gap:16px;font-size:12px;color:var(--text2);flex-wrap:wrap">
        <span>🎯 标题: <strong style="color:var(--text)">${esc(p.title || '?')}</strong></span>
        <span>🖼️ 封面: <strong style="color:var(--text)">${esc(p.cover_text || '?')}</strong></span>
        <span>🎵 ${esc(p.tone || '?')}</span>
        <span>⏱️ ${p.target_duration || 60}s</span>
      </div>
      ${p.hook_clip ? `<div style="margin-top:6px;font-size:12px;color:var(--accent2)">🪝 开头: ${esc(p.hook_clip)}</div>` : ''}
      ${p.clips && p.clips.length > 0 ? `
        <div style="margin-top:8px;font-size:12px;color:var(--text2)">
          时间线: ${p.clips.map(c => `${esc(c.role||'?')} ${c.start?.toFixed(1)}-${c.end?.toFixed(1)}s`).join(' → ')}
        </div>` : ''}
      <div style="margin-top:8px">
        <button class="btn" style="font-size:11px;padding:4px 10px" onclick="selectPlan('${esc(p.plan_id || '')}')">✅ 选择此方案</button>
      </div>
    </div>`;
  });
  return html;
}

function selectPlan(planId) {
  showToast(`✅ 已选择方案 ${planId}，请前往「决策书」和「发布包」确认`);
}

// ─── Retention Audit ───
function renderRetentionAudit(audit) {
  const passed = audit.pass;
  let html = `<div class="script-card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <span style="font-size:20px">${passed ? '✅' : '⚠️'}</span>
      <span style="font-size:16px;font-weight:600;color:${passed ? 'var(--green)' : 'var(--warn)'}">
        节奏检查: ${passed ? '通过' : `${audit.issues?.length || 0} 个问题`}
      </span>
    </div>`;

  if (audit.issues && audit.issues.length > 0) {
    html += '<div style="margin-bottom:12px">';
    audit.issues.forEach(issue => {
      html += `<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)">
        ❌ ${esc(issue)}
      </div>`;
    });
    html += '</div>';
  }

  if (audit.suggestions && audit.suggestions.length > 0) {
    html += '<div style="margin-bottom:12px">';
    audit.suggestions.forEach(s => {
      html += `<div style="padding:4px 0;font-size:12px;color:var(--accent2)">💡 ${esc(s)}</div>`;
    });
    html += '</div>';
  }

  // 检查项
  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;font-size:12px">
    <div>${audit.hooks_in_first_3s ? '✅' : '❌'} 前3秒有钩子</div>
    <div>${audit.theme_in_first_10s ? '✅' : '❌'} 前10秒交代主题</div>
    <div>${audit.has_before_after ? '✅' : '❌'} 有前后对比</div>
    <div>${audit.has_memory_point ? '✅' : '❌'} 有记忆点</div>
    <div>${audit.has_ending_interaction ? '✅' : '❌'} 结尾有互动</div>
    <div>${(audit.max_same_type_duration || 0) <= 8 ? '✅' : '❌'} 同类画面≤8秒 (${(audit.max_same_type_duration||0).toFixed(0)}s)</div>
  </div>`;

  html += '</div>';
  return html;
}

            <label>🎙️</label><input class="edit-field" data-field="voiceover_text" value="${esc(c.voiceover_text || '')}" placeholder="旁白文字" style="color:var(--accent3)">

  return html;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function togglePreview(el, srcUrl, start, end) {
  const container = el.nextElementSibling;
  if (container.classList.contains('show')) {
    // 隐藏预览
    container.classList.remove('show');
    container.innerHTML = '';
    el.textContent = '▶ 预览此片段';
  } else {
    // 显示预览
    const dur = (end - start).toFixed(1);
    container.innerHTML = `<video src="${srcUrl}#t=${start},${end}" controls autoplay style="max-height:400px"></video>
      <div style="font-size:11px;color:var(--text2);margin-top:4px">${start.toFixed(1)}s → ${end.toFixed(1)}s (${dur}s)</div>`;
    container.classList.add('show');
    el.textContent = '✕ 关闭预览';
    // seek到起始位置
    const video = container.querySelector('video');
    video.addEventListener('loadedmetadata', () => { video.currentTime = start; });
  }
}

// ─── Collect edited script from DOM ───
function collectScript() {
  const script = window._currentScript || {};
  script.title = document.getElementById('script-title')?.value || script.title;
  script.subtitle = document.getElementById('script-subtitle')?.value || script.subtitle;
  script.storyline = document.getElementById('script-storyline')?.value || script.storyline;
  script.tone = document.getElementById('script-tone')?.value || script.tone;
  script.duration_target = parseInt(document.getElementById('script-duration')?.value) || 66;
  script.music_style = document.getElementById('script-music')?.value || script.music_style;
  script.voiceover = document.getElementById('script-voiceover')?.value === 'true';
  const tagsStr = document.getElementById('script-hashtags')?.value || '';
  script.hashtags = tagsStr.split(/[,，、]/).map(s => s.trim()).filter(Boolean);

  // Collect clips
  const clipEls = document.querySelectorAll('#tc-script .script-clip');
  script.clips = Array.from(clipEls).map(el => {
    const clip = {};
    el.querySelectorAll('.edit-field').forEach(f => {
      let val = f.value;
      if (f.dataset.field === 'start' || f.dataset.field === 'end') val = parseFloat(val) || 0;
      clip[f.dataset.field] = val;
    });
    clip.duration = (clip.end || 0) - (clip.start || 0);
    return clip;
  });
  return script;
}

function collectEditPlan() {
  const plan = window._currentPlan || {};
  const clipEls = document.querySelectorAll('#tc-edit-plan .script-clip');
  plan.clips = Array.from(clipEls).map(el => {
    const clip = {};
    el.querySelectorAll('.edit-field').forEach(f => {
      let val = f.value;
      if (f.dataset.field === 'start' || f.dataset.field === 'end') val = parseFloat(val) || 0;
      clip[f.dataset.field] = val;
    });
    clip.duration = (clip.end || 0) - (clip.start || 0);
    return clip;
  });
  return plan;
}

async function saveStoryScript() {

  const script = collectScript();
  const status = document.getElementById('script-save-status');

  try {

    });

// ─── Run stages ───
async function runStage(stage) {
  if (!currentProject) return;
  const theme = document.getElementById('themeInput').value || '日常生活记录';
  const btn = event.target;
  btn.disabled = true;
  const origText = btn.textContent;
  btn.innerHTML = '<span class="spinner"></span>' + origText;

  showProgress();
  connectSSE();

  try {
    const duration = parseInt(document.getElementById('durationInput')?.value) || 60;
    const body = stage === 'visual-analysis' || stage === 'story-script' || stage === 'edit-plan'
      ? JSON.stringify({ theme, duration }) : '{}';
    const res = await fetch(`${API}/api/projects/${currentProject}/${stage}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body,
    });
    const data = await res.json();
    if (data.error) {
      alert('错误: ' + data.error);
    }
    // Reload project data
    await openProject(currentProject);
  } catch (e) {
    alert('请求失败: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = origText;
    hideProgress();
  }
}

async function runRender(mode) {

  } catch (e) {
    alert('请求失败: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = origText;
    hideProgress();
  }
}

async function runFullPipeline() {
  if (!currentProject) return;
  const theme = document.getElementById('themeInput').value || '日常生活记录';
  const duration = parseInt(document.getElementById('durationInput').value) || 60;
  const btn = document.getElementById('btnFullPipeline');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 全流程运行中...';

  showProgress();
  connectSSE();

  try {
    await fetch(`${API}/api/projects/${currentProject}/full-pipeline`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ theme, duration }),
    });

    // Poll for completion
    const checkDone = setInterval(async () => {
      const res = await fetch(`${API}/api/projects/${currentProject}/progress`);
      const data = await res.json();
      updateProgressUI(data);
      if (data.percent >= 100 || data.stage === 'error') {
        clearInterval(checkDone);
        await openProject(currentProject);
        btn.disabled = false;
        btn.innerHTML = '🚀 一键全流程';
        hideProgress();
      }
    }, 1000);
  } catch (e) {
    alert('请求失败: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '🚀 一键全流程';
    hideProgress();
  }
}

// ─── Progress ───
function showProgress() {
  document.getElementById('progressBar').style.display = 'block';
  document.getElementById('progressText').style.display = 'block';
}
function hideProgress() {
  setTimeout(() => {
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('progressText').style.display = 'none';
  }, 2000);
}
function updateProgressUI(data) {
  const pct = Math.max(0, Math.min(100, data.percent || 0));
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `[${data.stage}] ${data.message} (${pct}%)`;
}
function connectSSE() {
  if (progressSSE) progressSSE.close();
  progressSSE = new EventSource(`${API}/api/projects/${currentProject}/progress/stream`);
  progressSSE.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      updateProgressUI(data);
    } catch {}
  };
  progressSSE.onerror = () => { progressSSE.close(); };
}

// ─── Utilities ───
function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(1);
  return `${m}:${sec.padStart(4, '0')}`;
}

function syntaxHighlight(json) {
  return json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"([^"]+)"(?=\s*:)/g, '<span class="json-key">"$1"</span>')
    .replace(/:\s*"([^"]*)"/g, ': <span class="json-string">"$1"</span>')
    .replace(/:\s*(\d+\.?\d*)/g, ': <span class="json-number">$1</span>')
    .replace(/:\s*(true|false|null)/g, ': <span class="json-bool">$1</span>');
}

function renderShots(shotsData) {
  const shots = shotsData.shots || [];
  if (shots.length === 0) return '<div class="empty"><div class="icon">👁️</div><div class="msg">未发现可用片段</div></div>';

  // 按 source 分组
  const bySource = {};
  shots.forEach(s => {
    const src = s.source || 'unknown';
    if (!bySource[src]) bySource[src] = [];
    bySource[src].push(s);
  });

  let html = `<div style="margin-bottom:16px;font-size:13px;color:var(--text2)">
    共 ${shots.length} 个候选片段，来自 ${Object.keys(bySource).length} 个视频
    <span style="margin-left:12px">🟢 优质  🟡 普通  🔴 较差</span>
  </div>`;

  for (const [src, srcShots] of Object.entries(bySource)) {
    html += `<div style="margin-bottom:8px;font-size:13px;color:var(--accent3);font-weight:600">📁 ${esc(src)} (${srcShots.length} shots)</div>`;
    html += '<div class="shots-grid">';
    srcShots.forEach(s => {
      const isDeleted = s.delete;
      html += `<div class="shot-card ${isDeleted ? 'deleted' : ''}">
        <div class="shot-header">
          <span class="shot-id">${esc(s.shot_id || '?')}</span>
          <span class="shot-time">${(s.start||0).toFixed(1)}s → ${(s.end||0).toFixed(1)}s (${(s.duration||0).toFixed(1)}s)</span>
        </div>
        <div class="shot-summary">${esc(s.visual_summary || '?')}</div>
        <div class="shot-tags">
          ${(s.shot_types||[]).map(t => `<span class="shot-tag">${esc(t)}</span>`).join('')}
          ${(s.recommended_use||[]).map(u => `<span class="shot-tag use">${esc(u)}</span>`).join('')}
          ${isDeleted ? `<span class="shot-tag delete">🗑️ ${esc(s.delete_reason||'不建议使用')}</span>` : ''}
        </div>
        <div class="shot-scores">
          <div class="score-group">
            <div class="label">画面质量</div>
            ${renderScoreBar(s.quality, ['clarity','stability','exposure','composition'])}
          </div>
          <div class="score-group">
            <div class="label">平台评分</div>
            ${renderScoreBar(s.platform_scores, ['hook','retention','action','beauty','clarity','contrast','story_value','cover_value'])}
          </div>
        </div>
        ${(s.garden_objects||[]).length > 0 || (s.actions||[]).length > 0 ?
          `<div class="shot-objects">🏷️ ${[...(s.garden_objects||[]), ...(s.actions||[])].join(' · ')}</div>` : ''}
        <div class="shot-actions">
          <button class="btn" style="font-size:11px;padding:3px 8px" onclick="setShotAsRole('${esc(s.source||'')}', ${(s.start||0)}, ${(s.end||0)}, 'opening')">🎯 设为开头</button>
          <button class="btn" style="font-size:11px;padding:3px 8px" onclick="setShotAsRole('${esc(s.source||'')}', ${(s.start||0)}, ${(s.end||0)}, 'result')">🖼️ 设为封面</button>
          <button class="btn" style="font-size:11px;padding:3px 8px" onclick="previewShot('${esc(s.source||'')}', ${(s.start||0)}, ${(s.end||0)})">▶ 预览</button>
          <button class="btn" style="font-size:11px;padding:3px 8px;color:var(--danger)" onclick="markShotDelete('${esc(s.shot_id||'')}')">🗑️ 标记删除</button>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  return html;
}

function setShotAsRole(source, start, end, role) {
  // 将 shot 添加到剪辑计划中指定角色位置
  if (!window._currentPlan) {
    showToast('⚠️ 请先生成剪辑计划');
    return;
  }
  const clip = {
    role: role,
    source: source,
    start: start,
    end: end,
    duration: end - start,
    caption: '',
    note: `从镜头评分面板设置为 ${role}`,
  };
  // 替换或添加
  const plan = window._currentPlan;
  const idx = plan.clips.findIndex(c => c.role === role);
  if (idx >= 0) {
    plan.clips[idx] = {...plan.clips[idx], ...clip};
  } else {
    plan.clips.push(clip);
  }
  // 重新计算 timeline
  let t = 0;
  plan.clips.forEach(c => { c.timeline_start = t; c.timeline_end = t + (c.duration||0); t += (c.duration||0); });
  plan.actual_duration = t;
  // 刷新编辑计划视图
  document.getElementById('tc-edit-plan').innerHTML = renderEditPlan(plan);
  showToast(`✅ 已设置 ${role} 片段`);
}

function previewShot(source, start, end) {
  // 打开预览弹窗
  const url = `${API}/api/video/${currentProject}/${source}`;
  const lightbox = document.getElementById('lightbox');
  lightbox.innerHTML = `<video src="${url}#t=${start},${end}" controls autoplay style="max-width:90vw;max-height:90vh;border-radius:8px"></video>
    <div style="color:white;text-align:center;margin-top:8px">${source} ${start.toFixed(1)}s → ${end.toFixed(1)}s</div>`;
  lightbox.classList.add('show');
  lightbox.onclick = function(e) { if (e.target === lightbox) { lightbox.classList.remove('show'); lightbox.innerHTML = '<img id="lightboxImg" src="">'; lightbox.onclick = closeLightbox; } };
}

function markShotDelete(shotId) {
  showToast(`🗑️ 已标记 ${shotId} 为删除`);
  // 在 shots 数据中标记
  if (window._currentShots) {
    const shot = window._currentShots.find(s => s.shot_id === shotId);
    if (shot) { shot.delete = true; shot.delete_reason = '用户标记删除'; }
  }
}

function renderScoreBar(scores, keys) {
  if (!scores) return '';
  return '<div class="score-bar">' + keys.map(k => {
    const v = scores[k] || 0;
    const cls = v >= 8 ? 'high' : v <= 4 ? 'low' : 'filled';
    return `<div class="score-pip ${v > 0 ? cls : ''}" title="${k}: ${v}/10"></div>`;
  }).join('') + `<span style="font-size:10px;color:var(--text2);margin-left:4px">${Object.values(scores||{}).reduce((a,b)=>a+b,0) / Math.max(Object.keys(scores||{}).length,1)}/10</span></div>`;
}

function showLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

// ─── Create project ───
function showCreateModal() {
  document.getElementById('newProjectDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('newProjectTopic').value = '';
  document.getElementById('createModal').classList.add('show');
}

function closeCreateModal() {
  document.getElementById('createModal').classList.remove('show');
}

async function createProject() {
  const date = document.getElementById('newProjectDate').value;
  const topic = document.getElementById('newProjectTopic').value.trim();

  if (!date) { alert('请选择日期'); return; }
  if (!topic) { alert('请输入主题名称'); return; }

  try {
    const res = await fetch(`${API}/api/projects`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date, topic }),
    });
    const data = await res.json();
    if (data.error) { alert('错误: ' + data.error); return; }

    closeCreateModal();
    showToast(`✅ 项目已创建: ${data.date}/${data.topic_slug}`);
    await loadProjects();
  } catch (e) {
    alert('创建失败: ' + e.message);
  }
}

// Close modal on overlay click
document.getElementById('createModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeCreateModal();
});
document.getElementById('importModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeImportModal();
});

// ─── Import modal ───
function showImportModal() {
  if (!currentProject) { showToast('⚠️ 请先选择项目'); return; }
  document.getElementById('importModal').classList.add('show');
  document.getElementById('importStatus').textContent = '';
  document.getElementById('inboxVideos').innerHTML = '<div style="color:var(--text2);font-size:13px">点击"扫描"查看 Inbox 中的视频</div>';
  document.getElementById('dirVideos').innerHTML = '';
  // 自动扫描 Inbox
  scanInbox();
}

function closeImportModal() {
  document.getElementById('importModal').classList.remove('show');
}

async function scanInbox() {
  const container = document.getElementById('inboxVideos');
  container.innerHTML = '<span class="spinner"></span> 扫描中...';
  try {
    const res = await fetch(`${API}/api/scan-inbox`);
    const data = await res.json();
    if (!data.videos || data.videos.length === 0) {
      container.innerHTML = `<div style="color:var(--text2);font-size:13px">📭 Inbox 为空<br><span style="font-size:11px">将视频放入: ${esc(data.inbox || '~/Movies/GardenAutoCut/Inbox/')}</span></div>`;
      return;
    }
    let html = `<div style="font-size:12px;color:var(--text2);margin-bottom:6px">找到 ${data.videos.length} 个视频:</div>`;
    data.videos.forEach(v => {
      html += `<label style="display:flex;gap:8px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);cursor:pointer">
        <input type="checkbox" class="import-check" data-path="${esc(v.path)}" checked>
        <span style="font-size:13px;flex:1">${esc(v.filename)}</span>
        <span style="font-size:11px;color:var(--text2)">${v.duration?.toFixed(1)}s · ${v.size_mb}MB</span>
      </label>`;
    });
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = `<div style="color:var(--danger);font-size:13px">扫描失败: ${e.message}</div>`;
  }
}

async function scanDirectory() {
  const dirPath = document.getElementById('scanDirInput').value.trim();
  if (!dirPath) { showToast('⚠️ 请输入目录路径'); return; }

  const container = document.getElementById('dirVideos');
  container.innerHTML = '<span class="spinner"></span> 扫描中...';
  try {
    const res = await fetch(`${API}/api/scan-directory`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({path: dirPath})
    });
    const data = await res.json();
    if (data.error) { container.innerHTML = `<div style="color:var(--danger);font-size:13px">${esc(data.error.message || data.error)}</div>`; return; }
    if (!data.videos || data.videos.length === 0) {
      container.innerHTML = '<div style="color:var(--text2);font-size:13px">该目录无视频文件</div>';
      return;
    }
    let html = `<div style="font-size:12px;color:var(--text2);margin-bottom:6px">找到 ${data.videos.length} 个视频:</div>`;
    data.videos.forEach(v => {
      html += `<label style="display:flex;gap:8px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);cursor:pointer">
        <input type="checkbox" class="import-check" data-path="${esc(v.path)}" checked>
        <span style="font-size:13px;flex:1">${esc(v.filename)}</span>
        <span style="font-size:11px;color:var(--text2)">${v.duration?.toFixed(1)}s · ${v.size_mb}MB</span>
      </label>`;
    });
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = `<div style="color:var(--danger);font-size:13px">扫描失败: ${e.message}</div>`;
  }
}

async function importSelected() {
  const checks = document.querySelectorAll('.import-check:checked');
  const files = Array.from(checks).map(c => c.dataset.path).filter(Boolean);
  if (files.length === 0) { showToast('⚠️ 未选择任何文件'); return; }

  const status = document.getElementById('importStatus');
  status.textContent = '导入中...';
  try {
    const res = await fetch(`${API}/api/projects/${currentProject}/import-files`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({files})
    });
    const data = await res.json();
    if (data.error) { status.textContent = '❌ ' + (data.error.message || data.error); return; }
    status.textContent = `✅ 已导入 ${data.count} 个视频`;
    showToast(`✅ 已导入 ${data.count} 个视频`);
    // 刷新项目
    setTimeout(() => { closeImportModal(); openProject(currentProject); }, 1000);
  } catch(e) { status.textContent = '❌ ' + e.message; }
}

async function importManual() {
  const text = document.getElementById('manualPaths').value.trim();
  if (!text) { showToast('⚠️ 请输入文件路径'); return; }
  const files = text.split('\n').map(s => s.trim()).filter(Boolean);

  const status = document.getElementById('importStatus');
  status.textContent = '导入中...';
  try {
    const res = await fetch(`${API}/api/projects/${currentProject}/import-files`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({files})
    });
    const data = await res.json();
    if (data.error) { status.textContent = '❌ ' + (data.error.message || data.error); return; }
    status.textContent = `✅ 已导入 ${data.count} 个视频`;
    showToast(`✅ 已导入 ${data.count} 个视频`);
    setTimeout(() => { closeImportModal(); openProject(currentProject); }, 1000);
  } catch(e) { status.textContent = '❌ ' + e.message; }
}

// Init
loadProjects();
</script>
